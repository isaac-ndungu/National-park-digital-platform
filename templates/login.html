<div class="bg-stone-50 min-h-screen">
    <div class="grid lg:grid-cols-2 min-h-screen">

        <div class="relative hidden lg:block">
            <img src="assets/login-image.png" alt="Kenya Safari" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-stone-900 via-stone-900/20 to-transparent"></div>
            <div class="absolute bottom-32 left-10 p-12">
                <h2 class="font-serif text-5xl font-bold text-white mb-3">Welcome Back</h2>
                <p class="text-white/60 text-sm max-w-xs">Sign in to manage your safari bookings and explore Kenya's
                    national parks.</p>
            </div>
        </div>

        <div class="px-10 md:px-16 py-20 flex flex-col justify-center">

            <p class="text-xs tracking-widest uppercase text-orange-700 mb-3">Account</p>
            <h2 class="font-serif text-4xl font-bold text-stone-800 mb-2">Sign In</h2>
            <div class="h-0.5 w-12 bg-orange-700 mb-8"></div>

            <div class="mb-5">
                <label class="text-xs tracking-widest uppercase text-stone-600 font-semibold mb-2 block">Email</label>
                <input type="email" id="login-email" placeholder="email@example.com"
                    class="w-full py-3 px-4 text-stone-800 bg-white border border-stone-300 focus:border-orange-700 text-sm outline-none" />
                <p id="err-login-email" class="hidden text-red-500 text-xs mt-1"></p>
            </div>

            <div class="mb-2">
                <label
                    class="text-xs tracking-widest uppercase text-stone-600 font-semibold mb-2 block">Password</label>
                <div class="relative">
                    <input type="password" id="login-password" placeholder="Enter your password"
                        class="w-full py-3 px-4 text-stone-800 bg-white border border-stone-300 focus:border-orange-700 text-sm outline-none pr-10" />
                    
                </div>
                <p id="err-login-password" class="hidden text-red-500 text-xs mt-1"></p>
            </div>

            <div id="login-error" class="hidden bg-red-50 border border-red-200 px-4 py-3 mb-4 mt-4">
                <p id="login-error-text" class="text-sm text-red-600"></p>
            </div>

            <button
                class="mt-6 w-full py-3 bg-stone-800 hover:bg-orange-700 text-white text-xs tracking-widest uppercase transition-colors">
                Sign In
            </button>

            <p class="text-sm text-stone-500 text-center mt-6">
                Don't have an account?
                <a href="#register" class="text-orange-700 hover:text-orange-600 font-semibold transition-colors">Create
                    one</a>
            </p>

        </div>
    </div>
</div>

<div class="bg-gray-200">
    <!-- Hero Section -->
    <section class=" flex flex-col items-center justify-center text-center mb-10">
        <img id="park-hero" src="" alt="" class="relative opacity-70 w-full h-screen object-cover">
        <div class="absolute">
            <h1 id="park-name" class="text-6xl font-bold text-green-700 tracking-wide"></h1>
            <p id="park-description" class="text-2xl font-bold text-gray-700 p-10 tracking-tight"></p>
            
        </div>
    </section>

    <!-- About Section -->
    <section class="max-w-7xl mx-auto px-4 py-16">
        <div class="w-24 h-1 bg-orange-900 rounded-full mb-8"></div>

        <div class="flex gap-8">
            <div class="w-[55%]">
                <p id="park-main-desc" class="text-gray-700 mb-4"></p>
                <p id="park-main-desc1" class="text-gray-700"></p>
            </div>
            <div>
                <img id="park-thumbnail" src="" alt="" class="w-full object-cover rounded">
            </div>
        </div>

    </section>


    <!-- Wildlife Highlights -->

    <section class="bg-gray-50 py-16 max-w-7xl">
        <div class="mx-auto px-4">
            <h2 class="text-3xl font-bold mb-2">Wildlife Highlights</h2>
            <div id="park-wildlife" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </div>
    </section>

    <!-- Park Activities -->
    <section class="max-w-7xl mx-auto px-4 py-16">
        <h2 class="text-3xl font-bold mb-2">Activities</h2>
        <div id="park-activities" class="grid grid-cols-1 sm:grid-cols-3 gap-6"></div>

    </section>

    <!-- Entry Fees -->
    <section class="max-w-7xl bg-gray-50 py-16">
        <div class="mx-auto px-4">
            <h2 class="text-3xl font-bold mb-2">Entry Fees</h2>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
                <div class="bg-white p-6 shadow-sm rounded">
                    <h3 class="font-bold text-lg mb-4 text-green-700">Kenyan Resident</h3>
                    <div id="fees-kenyan"></div>
                </div>
                <div class="bg-white p-6 shadow-sm rounded">
                    <h3 class="font-bold text-lg mb-4 text-green-700">East African</h3>
                    <div id="fees-eastafrican"></div>
                </div>
                <div class="bg-white p-6 shadow-sm rounded">
                    <h3 class="font-bold text-lg mb-4 text-green-700">Non Resident</h3>
                    <div id="fees-nonresident"></div>
                </div>
            </div>

        </div>
        
    </section>

    <!-- Lodges -->
    <section class="max-w-7xl mx-auto px-4 py-16">
        <h2 class="text-3xl font-bold mb-2">accommodations</h2>
        <div id="park-lodges" class="grid grid-cols-1 sm:grid-cols-3 gap-6"></div>

    </section>
</div>

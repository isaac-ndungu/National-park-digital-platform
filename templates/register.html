<div class="bg-stone-50 min-h-screen">
    <div class="grid lg:grid-cols-2 min-h-screen">

        <!-- form side -->
        <div class="px-10 md:px-16 py-20 flex flex-col justify-center">

            <p class="text-xs tracking-widest uppercase text-orange-700 mb-3">Join Safarii</p>
            <h2 class="font-serif text-4xl font-bold text-stone-800 mb-2">Create Account</h2>
            <div class="h-0.5 w-12 bg-orange-700 mb-8"></div>

            <div class="grid sm:grid-cols-2 gap-5">
                <div>
                    <label class="text-xs tracking-widest uppercase text-stone-600 font-semibold mb-2 block">First Name</label>
                    <input type="text" id="reg-firstname" placeholder="Jane"
                        class="w-full py-3 px-4 text-stone-800 bg-white border border-stone-300 focus:border-orange-700 text-sm outline-none" />
                    <p id="err-reg-firstname" class="hidden text-red-500 text-xs mt-1"></p>
                </div>
                <div>
                    <label class="text-xs tracking-widest uppercase text-stone-600 font-semibold mb-2 block">Last Name</label>
                    <input type="text" id="reg-lastname" placeholder="Doe"
                        class="w-full py-3 px-4 text-stone-800 bg-white border border-stone-300 focus:border-orange-700 text-sm outline-none" />
                    <p id="err-reg-lastname" class="hidden text-red-500 text-xs mt-1"></p>
                </div>
                <div class="col-span-full">
                    <label class="text-xs tracking-widest uppercase text-stone-600 font-semibold mb-2 block">Email</label>
                    <input type="email" id="reg-email" placeholder="jane@example.com"
                        class="w-full py-3 px-4 text-stone-800 bg-white border border-stone-300 focus:border-orange-700 text-sm outline-none" />
                    <p id="err-reg-email" class="hidden text-red-500 text-xs mt-1"></p>
                </div>
                <div>
                    <label class="text-xs tracking-widest uppercase text-stone-600 font-semibold mb-2 block">Password</label>
                    <div class="relative">
                        <input type="password" id="reg-password" placeholder="Min. 8 characters"
                            class="w-full py-3 px-4 text-stone-800 bg-white border border-stone-300 focus:border-orange-700 text-sm outline-none pr-10" />
                        
                    </div>
                    <p id="err-reg-password" class="hidden text-red-500 text-xs mt-1"></p>
                </div>
                <div>
                    <label class="text-xs tracking-widest uppercase text-stone-600 font-semibold mb-2 block">Confirm Password</label>
                    <div class="relative">
                        <input type="password" id="reg-confirm" placeholder="Repeat password"
                            class="w-full py-3 px-4 text-stone-800 bg-white border border-stone-300 focus:border-orange-700 text-sm outline-none pr-10" />
                        
                    </div>
                    <p id="err-reg-confirm" class="hidden text-red-500 text-xs mt-1"></p>
                </div>
            </div>

            <div id="reg-error" class="hidden bg-red-50 border border-red-200 px-4 py-3 mt-5">
                <p id="reg-error-text" class="text-sm text-red-600"></p>
            </div>

            <button onclick="submitRegister()"
                class="mt-6 w-full py-3 bg-stone-800 hover:bg-orange-700 text-white text-xs tracking-widest uppercase transition-colors">
                Create Account
            </button>

            <p class="text-sm text-stone-500 text-center mt-6">
                Already have an account?
                <a href="#login" class="text-orange-700 hover:text-orange-600 font-semibold transition-colors">Sign in</a>
            </p>

        </div>

        <div class="relative hidden lg:block">
            <img src="assets/login-image.png" alt="Kenya Safari"
                class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-t from-stone-900 via-stone-900/20 to-transparent"></div>
            <div class="absolute bottom-32 left-0 p-12">
                <h2 class="font-serif text-5xl font-bold text-white mb-3">Start Your Journey</h2>
                <p class="text-white/60 text-md max-w-md">Create an account to book safari packages and save your favourite parks and lodges.</p>
            </div>
        </div>

    </div>
</div>

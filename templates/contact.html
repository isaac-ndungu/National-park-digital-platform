<div class="bg-stone-50 min-h-screen">
    <div class=" max-w-screen-xl mx-auto">
        <div class="grid lg:grid-cols-2 min-h-screen">

            <div class="px-10 md:px-16 py-20 flex flex-col justify-center">
                <div>
                    <p class="text-xs tracking-widest uppercase text-orange-700 mb-3">Get In Touch</p>
                    <h2 class="font-serif text-5xl text-slate-900 font-bold mb-4">Contact us</h2>
                    <p class="text-md text-slate-600 leading-relaxed mb-10">Have questions or need assistance? We're here
                        to help! Reach out to our team for support, inquiries, or collaboration opportunities.</p>
                </div>
                <form>
                    <div class="grid sm:grid-cols-2 gap-5">
                        <div>
                            <label class='text-xs tracking-widest text-slate-900 uppercase font-bold mb-2 block'>Name</label>
                            <input type='text' id="contact-name" placeholder='Enter Name'
                                class="w-full py-3 px-4 text-slate-800 bg-white border border-gray-300 focus:border-slate-900 text-sm outline-0 rounded-md" />
                        </div>
                        <div>
                            <label class='text-xs tracking-widest text-slate-900 uppercase font-bold mb-2 block'>Email</label>
                            <input type='email' id="contact-email" placeholder='Enter Email'
                                class="w-full py-3 px-4 text-slate-800 bg-white border border-gray-300 focus:border-slate-900 text-sm outline-0 rounded-md" />
                        </div>
                        <div>
                            <label class='text-xs tracking-widest text-slate-900 uppercase font-bold mb-2 block'>Phone No.</label>
                            <input type='number' id="contact-phone" placeholder='Enter Phone No.'
                                class="w-full py-3 px-4 text-slate-800 bg-white border border-gray-300 focus:border-slate-900 text-sm outline-0 rounded-md" />
                        </div>
                        <div>
                            <label class='text-xs tracking-widest text-slate-900 uppercase font-bold mb-2 block'>Subject</label>
                            <input type='text' id="contact-subject" placeholder='Enter Subject'
                                class="w-full py-3 px-4 text-slate-800 bg-white border border-gray-300 focus:border-slate-900 text-sm outline-0 rounded-md" />
                        </div>
                        <div class="col-span-full">
                            <label class='text-xs tracking-widest text-slate-900 uppercase font-bold mb-2 block'>Message</label>
                            <textarea placeholder='Enter Message' id="contact-message" rows="6"
                                class="w-full px-4 text-slate-800 bg-white border border-gray-300 focus:border-slate-900 text-sm pt-3 outline-0 rounded-md"></textarea>
                        </div>
                    </div>
                    <p id="contact-error" class="hidden text-red-500 text-md mt-2"></p>
                    <div id="contact-success" class="hidden bg-green-50 border-green-200 px-4 py-3 mt-2">
                        <p class="text-md text-green-700 font-semibold">Message sent successfully!</p>
                        <p class="text-sm text-green-600 mt-1">We'll get back to you within 24 hours.</p>
                    </div>
                    <button type='button' onclick="submitContactForm()"
                        class="mt-6 w-full py-3 bg-stone-800 hover:bg-orange-700 text-white text-xs tracking-widest uppercase transition-colors">Send
                        message</button>
                </form>
            </div>
    
            <div class="relative hidden lg:block">
                <div class="absolute inset-0 bg-gradient-to-r from-stone-50 via-transparent to-transparent z-10"></div>
                <img src="../assets/contact-image.png" alt="contact image"
                    class="w-full h-full object-cover object-top lg:absolute lg:right-0 lg:top-0 lg:bottom-0" />
            </div>
        </div>
    </div>
</div>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Safarii</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kit.fontawesome.com/ac82667efe.js" crossorigin="anonymous"></script>
</head>

<body>
    <header class="bg-emerald-800">
        <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
            <div class="flex h-16 items-center justify-between">
                <div class="md:flex md:items-center md:gap-12">
                    <a class="block text-white" href="#">
                        <p class="font-black tracking-wider text-3xl">Safar<span class="text-orange-600">ii</span></p>

                </div>

                <div class="hidden md:block">
                    <nav aria-label="Global">
                        <ul class="flex items-center gap-6 text-sm">
                            <li>
                                <a class="text-gray-500 transition text-orange-500 hover:text-white/75 font-semibold text-lg tracking-wide"
                                    href="#">
                                    Home
                                </a>
                            </li>

                            <li>
                                <a class="text-gray-500 transition text-white hover:text-orange-500/80 font-semibold text-lg tracking-wide"
                                    href="#">
                                    Parks
                                </a>
                            </li>

                            <li>
                                <a class="text-gray-500 transition text-white hover:text-orange-500/80 font-semibold text-lg tracking-wide"
                                    href="#">
                                    About
                                </a>
                            </li>

                            <li>
                                <a class="text-gray-500 transition text-white hover:text-orange-500/80 font-semibold text-lg tracking-wide"
                                    href="#">
                                    Contacts
                                </a>
                            </li>

                            <li>
                                <a class="text-gray-500 transition text-white hover:text-orange-500/80 font-semibold text-lg tracking-wide"
                                    href="#">
                                    Blog
                                </a>
                            </li>
                        </ul>
                    </nav>
                </div>

                <div class="flex items-center gap-4">
                    <div class="sm:flex sm:gap-4">
                        <a class="rounded-md bg-orange-600 px-5 py-2.5 text-sm font-bold text-white shadow-sm hover:bg-orange-700"
                            href="#">
                            Login
                        </a>

                        <div class="hidden sm:flex">
                            <a class="rounded-md bg-gray-100 px-5 py-2.5 text-sm font-bold text-teal-600 dark:bg-gray-800 dark:text-white dark:hover:text-white/75"
                                href="#">
                                Register
                            </a>
                        </div>
                    </div>

                    <div class="block md:hidden">
                        <button
                            class="rounded-sm bg-gray-100 p-2 text-gray-600 transition hover:text-gray-600/75 dark:bg-gray-800 dark:text-white dark:hover:text-white/75">
                            <svg xmlns="http://www.w3.org/2000/svg" class="size-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>


    <main>
        <section class=" flex flex-col items-center justify-center text-center gap-6">
            <img src="assets/wilderbeasts.png" alt="wilderbeasts" class="relative opacity-70 w-full h-screen object-cover">
            <div class="absolute">
                <h1 class="text-6xl font-bold text-emerald-800 tracking-wide">Welcome to Safar<span class="text-orange-500">ii</span></h1>
                <p class="text-2xl font-bold text-gray-700 p-10 tracking-tight">Experience the wild beauty of Kenya while supporting eco-friendly accommodations</p>
                <div class="text-2xl">
                    <button class="rounded-md bg-orange-600 px-5 py-2.5 text-lg font-bold text-white shadow-sm hover:bg-orange-700 tracking-wider"> Explore Parks</button>
                    <button class="rounded-md bg-white px-5 py-2.5 text-lg font-bold text-orange-600 hover:text-orange-500 hover:bg-white/85 tracking-wider"> Learn More</button>
                </div>
            </div>


        </section>
    </main>
</body>

</html>
